<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Fondo degradado suave -->
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#f8f9fc"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4e73df"/>
      <stop offset="100%" stop-color="#2e59d9"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#858796"/>
      <stop offset="100%" stop-color="#5a5c69"/>
    </linearGradient>
  </defs>
  
  <!-- Cielo -->
  <rect width="500" height="400" fill="url(#skyGrad)"/>
  
  <!-- Nubes -->
  <ellipse cx="80" cy="80" rx="50" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="65" rx="40" ry="28" fill="white" opacity="0.8"/>
  <ellipse cx="60" cy="72" rx="35" ry="20" fill="white" opacity="0.8"/>
  
  <ellipse cx="380" cy="60" rx="45" ry="22" fill="white" opacity="0.7"/>
  <ellipse cx="405" cy="48" rx="38" ry="26" fill="white" opacity="0.7"/>
  <ellipse cx="360" cy="55" rx="32" ry="18" fill="white" opacity="0.7"/>
  
  <!-- Carretera -->
  <rect x="0" y="290" width="500" height="110" fill="url(#roadGrad)" rx="0"/>
  <!-- Líneas de carretera -->
  <rect x="60" y="335" width="70" height="8" fill="white" opacity="0.6" rx="4"/>
  <rect x="200" y="335" width="70" height="8" fill="white" opacity="0.6" rx="4"/>
  <rect x="340" y="335" width="70" height="8" fill="white" opacity="0.6" rx="4"/>
  
  <!-- Sombra del auto -->
  <ellipse cx="250" cy="295" rx="130" ry="12" fill="#5a5c69" opacity="0.3"/>
  
  <!-- Cuerpo del auto -->
  <path d="M120 255 L150 200 L220 185 L310 183 L370 200 L390 255 Z" fill="url(#carBody)"/>
  <!-- Techo del auto -->
  <path d="M165 200 L185 160 L315 160 L345 200 Z" fill="#3a5bbf"/>
  
  <!-- Ventanas -->
  <path d="M175 197 L188 165 L250 165 L250 197 Z" fill="#a8d4f5" opacity="0.9"/>
  <path d="M258 197 L258 165 L322 165 L335 197 Z" fill="#a8d4f5" opacity="0.9"/>
  <!-- Marco ventanas -->
  <path d="M175 197 L188 165 L250 165 L250 197 Z" fill="none" stroke="#2e4a9a" stroke-width="2"/>
  <path d="M258 197 L258 165 L322 165 L335 197 Z" fill="none" stroke="#2e4a9a" stroke-width="2"/>
  
  <!-- Detalles laterales -->
  <line x1="120" y1="230" x2="390" y2="230" stroke="#2e4a9a" stroke-width="2" opacity="0.5"/>
  
  <!-- Rueda delantera -->
  <circle cx="175" cy="270" r="38" fill="#2d3748"/>
  <circle cx="175" cy="270" r="28" fill="#4a5568"/>
  <circle cx="175" cy="270" r="16" fill="#718096"/>
  <circle cx="175" cy="270" r="6" fill="#e2e8f0"/>
  <!-- Rayos rueda delantera -->
  <line x1="175" y1="254" x2="175" y2="286" stroke="#2d3748" stroke-width="3"/>
  <line x1="159" y1="270" x2="191" y2="270" stroke="#2d3748" stroke-width="3"/>
  <line x1="163" y1="258" x2="187" y2="282" stroke="#2d3748" stroke-width="2"/>
  <line x1="187" y1="258" x2="163" y2="282" stroke="#2d3748" stroke-width="2"/>
  
  <!-- Rueda trasera -->
  <circle cx="330" cy="270" r="38" fill="#2d3748"/>
  <circle cx="330" cy="270" r="28" fill="#4a5568"/>
  <circle cx="330" cy="270" r="16" fill="#718096"/>
  <circle cx="330" cy="270" r="6" fill="#e2e8f0"/>
  <!-- Rayos rueda trasera -->
  <line x1="330" y1="254" x2="330" y2="286" stroke="#2d3748" stroke-width="3"/>
  <line x1="314" y1="270" x2="346" y2="270" stroke="#2d3748" stroke-width="3"/>
  <line x1="318" y1="258" x2="342" y2="282" stroke="#2d3748" stroke-width="2"/>
  <line x1="342" y1="258" x2="318" y2="282" stroke="#2d3748" stroke-width="2"/>
  
  <!-- Faros delanteros -->
  <ellipse cx="122" cy="228" rx="12" ry="8" fill="#fef08a" opacity="0.9"/>
  <ellipse cx="122" cy="228" rx="12" ry="8" fill="none" stroke="#eab308" stroke-width="1.5"/>
  
  <!-- Faros traseros -->
  <ellipse cx="388" cy="228" rx="10" ry="8" fill="#f87171" opacity="0.9"/>
  
  <!-- Parachoques -->
  <path d="M108 250 Q115 260 125 262 L120 255 Z" fill="#2e4a9a"/>
  <path d="M392 250 Q385 260 375 262 L380 255 Z" fill="#2e4a9a"/>
  
  <!-- Texto Galeras Cars -->
  <text x="250" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" opacity="0.8">GALERAS CARS</text>
</svg>
